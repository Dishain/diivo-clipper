<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      :root {
        color-scheme: light dark;
        --accent: #2a85ff;
      }
      body {
        width: 280px;
        margin: 0;
        padding: 16px;
        font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        background: #ffffff;
        color: #1c1c1e;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 15px;
        font-weight: 700;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 10px 0 14px;
        font-size: 12px;
      }
      .dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #c8c8cc;
      }
      .dot.on { background: #1fb36b; }
      .dot.off { background: #ff5a5a; }
      label {
        display: block;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: #6b6b70;
        margin-bottom: 6px;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 8px 10px;
        border: 1px solid #d8d8dc;
        border-radius: 8px;
        font: inherit;
      }
      button {
        margin-top: 10px;
        width: 100%;
        padding: 9px;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover { background: #1e6fe0; }
      .hint { margin-top: 10px; color: #8a8a8e; font-size: 11px; }
      @media (prefers-color-scheme: dark) {
        body { background: #141619; color: #f3f4f6; }
        input { background: #1c1f24; border-color: #2a2f3a; color: #f3f4f6; }
        h1 { color: #f3f4f6; }
      }
    </style>
  </head>
  <body>
    <h1>ShainBox Clipper</h1>
    <div class="status">
      <span id="appDot" class="dot"></span>
      <span id="appText">Checking…</span>
    </div>
    <label for="token">Pairing token</label>
    <input id="token" type="text" placeholder="Paste token from ShainBox → Settings" />
    <button id="save">Pair</button>
    <div class="hint" id="hint">
      In the app: Settings → Browser clipper → turn it on → copy the token here.
    </div>
    <script src="popup.js"></script>
  </body>
</html>
